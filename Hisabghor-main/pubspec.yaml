name: hisabghor_pro
description: "হিসাবঘর Pro - বাংলা + ইংরেজি স্টোর ম্যানেজমেন্ট এপ্লিকেশন | Smart Store Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Replace the original line with this:
  flutter_sms:
    path: packages/flutter_sms
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  
  # State Management
  provider: ^6.1.2
  get: ^4.6.6
  
  # Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0
  
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.1
  firebase_database: ^11.0.0
  
  # Google Services
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  sheet: ^1.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  
  # File Handling
  file_picker: ^8.1.2
  excel: ^4.0.6
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  path: ^1.9.0
  
  # Communication
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  http: ^1.2.2
  flutter_contacts: ^1.1.9+2
  email_validator: ^2.1.17
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.2.3
  crypto: ^3.0.3
  pin_code_fields: ^8.0.1
  
  # Scanner
  mobile_scanner: ^5.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
    - assets/translations/
  
  fonts:
    - family: Hind Siliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
        - asset: assets/fonts/HindSiliguri-Medium.ttf
          weight: 500
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700
