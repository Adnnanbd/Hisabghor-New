name: hisabghor_pro
description: "হিসাবঘর Pro - বাংলা + ইংরেজি স্টোর ম্যানেজমেন্ট অ্যাপ | Smart Store Management App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  pin_code_fields: ^8.0.1

  # State Management
  provider: ^6.1.2
  get: ^4.6.6

  # Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # File Handling
  file_picker: ^8.1.2
  excel: ^4.0.6
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  path: ^1.9.0
  share_plus: ^10.1.2

  # Google Services (Backup & Contacts)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  google_drive_rest_api: ^2.0.0
  http: ^1.2.2

  # Phone Contacts
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

  # SMS & Communication
  flutter_sms:
    path: packages/flutter_sms
  email_validator: ^2.1.17

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  crypto: ^3.0.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
    - assets/translations/
  
  fonts:
    - family: Hind Siliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
        - asset: assets/fonts/HindSiliguri-Medium.ttf
          weight: 500
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700
