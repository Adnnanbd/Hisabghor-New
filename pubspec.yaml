name: hisabghor_pro
description: "হিসাবঘর Pro - বাংলা স্টোর ম্যানেজমেন্ট অ্যাপ"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2
  # Removed Firebase and complex plugins to prevent startup crashes

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Commented out assets/fonts to prevent crash if files are missing
  # Uncomment only if you are 100% sure the files exist in your repo
  # assets:
  #   - assets/images/
  #   - assets/fonts/
  #   - assets/translations/
  # fonts:
  #   - family: Hind Siliguri
  #     fonts:
  #       - asset: assets/fonts/HindSiliguri-Regular.ttf
